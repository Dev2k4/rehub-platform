<!doctype html>
<html>
  <body style="font-family:Arial,sans-serif;color:#111827;line-height:1.6;">
    <h2>Reset your password</h2>
    <p>Hello {{ full_name }},</p>
    <p>We received a request to reset your password for {{ project_name }}.</p>
    <p>
      <a href="{{ reset_url }}" style="display:inline-block;padding:10px 16px;background:#2563eb;color:#fff;text-decoration:none;border-radius:6px;">
        Reset Password
      </a>
    </p>
    <p>This link will expire in {{ expires_hours }} hour(s).</p>
    <p>If you did not request this, you can ignore this email.</p>
  </body>
</html>
