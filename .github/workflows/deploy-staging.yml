name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy (branch/tag/sha)
        required: true
        default: main
      force_recreate:
        description: Force recreate containers
        required: false
        default: "false"

concurrency:
  group: staging-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets and env keys
        env:
          STAGING_SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          STAGING_SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          STAGING_APP_DIR: ${{ secrets.STAGING_APP_DIR }}
          STAGING_ENV_PRODUCTION: ${{ secrets.STAGING_ENV_PRODUCTION }}
        run: |
          set -eu

          for key in STAGING_SSH_HOST STAGING_SSH_USER STAGING_SSH_KEY STAGING_APP_DIR STAGING_ENV_PRODUCTION; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: ${key}"
              exit 1
            fi
          done

          required_env_keys="DOMAIN SECRET_KEY POSTGRES_PASSWORD MINIO_ROOT_PASSWORD"
          for env_key in $required_env_keys; do
            if ! printf '%s\n' "$STAGING_ENV_PRODUCTION" | grep -q "^${env_key}="; then
              echo "STAGING_ENV_PRODUCTION is missing key: ${env_key}"
              exit 1
            fi
          done

      - name: Deploy to staging over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_SSH_PORT || '22' }}
          script_stop: true
          command_timeout: 45m
          script: |
            set -eu

            APP_DIR="${{ secrets.STAGING_APP_DIR }}"
            DEPLOY_REF="${{ github.event.inputs.ref }}"
            FORCE_RECREATE="${{ github.event.inputs.force_recreate }}"
            REPO_URL="https://github.com/${{ github.repository }}.git"

            if [ -z "$APP_DIR" ]; then
              echo "STAGING_APP_DIR secret is required"
              exit 1
            fi

            if [ ! -d "$APP_DIR/.git" ]; then
              mkdir -p "$APP_DIR"
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch --all --prune
            git fetch origin "$DEPLOY_REF" --depth=1
            git checkout --detach FETCH_HEAD

            cat > .env.production <<'ENVEOF'
            ${{ secrets.STAGING_ENV_PRODUCTION }}
            ENVEOF

            if [ "$FORCE_RECREATE" = "true" ]; then
              docker compose -f docker-compose.prod.yml --env-file .env.production down --remove-orphans
            fi

            docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build

            for i in $(seq 1 40); do
              if docker compose -f docker-compose.prod.yml --env-file .env.production exec -T backend curl -fsS http://localhost:8000/api/v1/utils/health-readiness/ | grep -q '"status":"ready"'; then
                echo "Staging readiness is healthy"
                docker compose -f docker-compose.prod.yml --env-file .env.production ps
                exit 0
              fi
              echo "Waiting for staging readiness... ($i/40)"
              sleep 3
            done

            echo "Staging readiness check failed"
            docker compose -f docker-compose.prod.yml --env-file .env.production ps
            docker compose -f docker-compose.prod.yml --env-file .env.production logs backend --tail=200
            exit 1
