services:

  db:
    image: postgres:15
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rehub"]
      interval: 5s
      retries: 5
      timeout: 5s
    volumes:
      - app-db-data:/var/lib/postgresql/data/pgdata
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_PASSWORD=Hieu2004@
      - POSTGRES_USER=postgres
      - POSTGRES_DB=rehub
    ports:
      - "5433:5432"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      router9:
        condition: service_started
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=rehub
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=Hieu2004@
      - MINIO_ENDPOINT=http://minio:9000
      - AI_PROVIDER_NAME=9router
      - AI_PROVIDER_BASE_URL=http://router9:20128/v1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/utils/health-check/"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb -p local/${MINIO_BUCKET_NAME} || true;
      mc anonymous set download local/${MINIO_BUCKET_NAME} || true;
      exit 0;
      "
    restart: "no"

  router9:
    image: node:20-alpine
    restart: always
    command: >
      sh -c "npm install -g 9router && 9router -H 0.0.0.0 -p 20128 -n -t"
    ports:
      - "20128:20128"

volumes:
  app-db-data:
  minio-data:

networks:
  default:
    name: rehub_network
